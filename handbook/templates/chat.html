<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Chat with PDFs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 16px;
        }
        .nav {
            margin-bottom: 20px;
        }
        .nav a {
            margin-right: 12px;
            text-decoration: none;
            color: #2563eb;
            font-weight: bold;
        }
        .chat-box {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 16px;
            min-height: 350px;
            background: #fafafa;
            margin-bottom: 16px;
            overflow-y: auto;
        }
        .msg {
            margin-bottom: 14px;
            padding: 10px 12px;
            border-radius: 8px;
            max-width: 85%;
            white-space: pre-wrap;
        }
        .user {
            background: #dbeafe;
            margin-left: auto;
        }
        .bot {
            background: #e5e7eb;
            margin-right: auto;
        }
        .status {
            margin-bottom: 12px;
            padding: 12px;
            background: #eef6ff;
            border-radius: 8px;
        }
        .row {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        button {
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="nav">
    <a href="/upload">Upload</a>
    <a href="/chat">Chat</a>
</div>

<h1>Chat with Your Documents</h1>

<div class="status" id="statusText">
    {% if status.running %}
    Documents are currently being indexed...
    {% else %}
    {{ status.last_message }}
    {% endif %}
</div>

<div class="chat-box" id="chatBox"></div>

<div class="row">
    <input type="text" id="questionInput" placeholder="Ask a question about your PDFs..." />
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    const chatBox = document.getElementById("chatBox");
    const questionInput = document.getElementById("questionInput");
    const statusText = document.getElementById("statusText");

    function addMessage(text, cls) {
        const div = document.createElement("div");
        div.className = `msg ${cls}`;
        div.textContent = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function refreshStatus() {
        try {
            const res = await fetch("/api/status");
            const data = await res.json();

            if (data.running) {
                statusText.textContent = "Documents are currently being indexed...";
            } else {
                statusText.textContent = data.last_message;
            }
        } catch (err) {
            console.error(err);
        }
    }

    async function sendMessage() {
        const question = questionInput.value.trim();
        if (!question) return;

        addMessage(question, "user");
        questionInput.value = "";

        try {
            const res = await fetch("/api/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ question })
            });

            const data = await res.json();

            if (data.answer) {
                addMessage(data.answer, "bot");
            } else if (data.error) {
                addMessage("Error: " + data.error, "bot");
            } else {
                addMessage("Something went wrong.", "bot");
            }
        } catch (err) {
            addMessage("Request failed.", "bot");
        }
    }

    questionInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
            sendMessage();
        }
    });

    setInterval(refreshStatus, 3000);
    refreshStatus();
</script>
</body>
</html>
